name: 'my_new_project'
version: '1.0.0'
config-version: 2

profile: 'default'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  my_new_project:
    staging:
      +schema: staging
      +materialized: table
    marts:
      +schema: marts
      +materialized: table

seeds:
  my_new_project:
    +schema: marts     # Seeds will be loaded to the MARTS schema
